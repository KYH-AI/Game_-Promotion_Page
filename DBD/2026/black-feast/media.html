<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>검은 연회 미디어 갤러리 | Black Feast - Dead by Daylight</title>
<meta name="description" content="검은 연회 이벤트의 메뉴 갤러리와 연회 분위기 컨셉 아트를 확인하세요.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Oswald:wght@300;400;500;700&family=Noto+Serif+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
<link rel="stylesheet" href="./css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="brand">검은 <span>연회</span></a>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">HOME</a></li>
        <li><a href="media.html" class="active">MEDIA</a></li>
      </ul>
    </nav>
    <button class="nav-toggle" aria-label="메뉴 열기">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<main>

  <section class="page-hero">
    <div class="container">
      <button class="audio-toggle-btn bgm-player audio-toggle-inline" onclick="toggleAudio()">
        <span class="bgm-player-icon">▶</span>
        <span class="bgm-player-bars"><span></span><span></span><span></span></span>
        <span class="bgm-player-label">BGM 재생</span>
      </button>
      <h1 data-aos="fade-up">연회의 메뉴 갤러리</h1>
      <p data-aos="fade-up" data-aos-delay="100">검은 연회의 메뉴와 분위기를 실제 인게임 장면으로 만나보세요.</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="section-head">
        <span class="section-eyebrow">Menu Gallery</span>
        <h2 class="section-title">오늘의 메뉴 3종</h2>
      </div>
      <div class="gallery-grid">
        <div class="gallery-card gallery-card--photo" data-aos="fade-up" style="background-image: url('./images/dish-trotters.png');"><span>쫄깃한 족발</span></div>
        <div class="gallery-card gallery-card--photo" data-aos="fade-up" data-aos-delay="100" style="background-image: url('./images/dish-pasta.png');"><span>꾸덕한 크리미 파스타</span></div>
        <div class="gallery-card gallery-card--photo" data-aos="fade-up" data-aos-delay="200" style="background-image: url('./images/dish-camembert.png');"><span>흰 곰팡이 까망베르 치즈 구이</span></div>
      </div>
    </div>
  </section>

  <section class="section section-alt">
    <div class="container">
      <div class="section-head">
        <span class="section-eyebrow">Atmosphere</span>
        <h2 class="section-title">연회의 분위기</h2>
      </div>
      <figure class="gallery-feature" data-aos="fade-up">
        <img src="./images/atmosphere-tables.jpg" alt="촛불 만찬 테이블">
        <figcaption>희생제에서 만찬 테이블로 변경</figcaption>
      </figure>
      <figure class="gallery-feature" data-aos="fade-up" data-aos-delay="100">
        <img src="./images/atmosphere-cart.jpg" alt="서빙 카트">
        <figcaption>서빙 카트</figcaption>
        <p class="fun-fact">(달콤한 케이크)</p>
      </figure>
      <figure class="gallery-feature" data-aos="fade-up" data-aos-delay="200">
        <img src="./images/atmosphere-dessert.jpg" alt="디저트 단계 분위기">
        <figcaption>디저트 단계 분위기</figcaption>
        <p class="fun-fact">(금강산도 식후경, 제이슨의 못에 꽂혀도 디저트는 못 참습니다.)</p>
      </figure>
      <figure class="gallery-feature" data-aos="fade-up" data-aos-delay="300">
        <img src="./images/atmosphere-tableset.jpg" alt="둘이 먹다가 하나가 죽어도 모를 정도로 맛을 자랑하는 만찬">
        <figcaption>둘이 먹다가 하나가 죽어도 모를 정도로 맛을 자랑하는 만찬</figcaption>
      </figure>
      <figure class="gallery-feature" data-aos="fade-up" data-aos-delay="350">
        <img src="./images/atmosphere-guarding.jpg" alt="하지만 이번 만찬 만큼은 양보하지 않은 권태영씨">
        <figcaption>하지만 이번 만찬 만큼은 양보하지 않은 권태영씨</figcaption>
      </figure>
      <figure class="gallery-feature" data-aos="fade-up" data-aos-delay="400">
        <img src="./images/atmosphere-runaway.jpg" alt="권태영도 너무 맛있어서 들고 도망치는 만찬">
        <figcaption>권태영도 너무 맛있어서 들고 도망치는 만찬</figcaption>
        <p class="fun-fact">(그의 만찬을 쫓아오는 다른 참가자)</p>
      </figure>
    </div>
  </section>

  <div class="back-home">
    <a href="index.html" class="back-link">← 메인으로 돌아가기</a>
  </div>

</main>

<footer class="site-footer">
  <div class="container">
  </div>
</footer>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="./js/main.js"></script>
<script src="./js/ambient.js"></script>
<button class="audio-toggle-btn audio-toggle-fixed" onclick="toggleAudio()">🔊 배경음 ON</button>
</body>
</html>
