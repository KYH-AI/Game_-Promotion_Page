<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Promotion Page</title>
<meta name="description" content="게임별 홍보 이벤트 페이지 모음">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14161b;
    --surface: #1d2026;
    --border: #2c2f37;
    --text: #e8e9ec;
    --text-dim: #9a9da6;
    --accent: #5b8cff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    line-height: 1.6;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
  header.site-header { padding: 64px 0 32px; text-align: center; }
  header.site-header h1 { font-size: clamp(1.8rem, 4vw, 2.4rem); font-weight: 900; margin-bottom: 12px; }
  header.site-header p { color: var(--text-dim); }
  main { padding-bottom: 80px; }
  .card-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
  }
  .game-card {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 32px;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.25s, border-color 0.25s;
  }
  .game-card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .game-card .tag {
    display: inline-block;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 999px;
    padding: 3px 12px;
    margin-bottom: 14px;
    width: fit-content;
  }
  .game-card h2 { font-size: 1.3rem; margin-bottom: 8px; }
  .game-card p { color: var(--text-dim); font-size: 0.95rem; }
  footer { text-align: center; padding: 32px 0; color: var(--text-dim); font-size: 0.82rem; border-top: 1px solid var(--border); }

  @media (min-width: 768px) {
    .card-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
    .card-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="container">
    <h1>Game Promotion Page</h1>
    <p>게임별 홍보 이벤트 페이지 모음</p>
  </div>
</header>

<main>
  <div class="container">
    <div class="card-grid">

      <a class="game-card" href="DBD/2026/black-feast/index.html">
        <span class="tag">Dead by Daylight</span>
        <h2>검은 연회 (Black Feast)</h2>
        <p>10주년 기념 한정 이벤트 — 2026.06.26 ~ 07.17</p>
      </a>

      <a class="game-card" href="DBD/2026/BloodMoon/DBD_bloodmoon2026.html">
        <span class="tag">Dead by Daylight</span>
        <h2>블러드문 2026</h2>
        <p>Dead by Daylight 블러드문 이벤트</p>
      </a>

      <a class="game-card" href="BIOHAZARD/2026/BIOHAZARD_30TH_SALE/index.html">
        <span class="tag">Resident Evil</span>
        <h2>바이오하자드 30주년 기념 세일</h2>
        <p>바이오하자드 30주년 기념 세일 · 특별 에디션</p>
      </a>

    </div>
  </div>
</main>

<footer>
  <div class="container">
    &copy; 2026 Game Promotion Page. 각 게임의 공식 페이지가 아닌 팬 홍보 페이지 모음입니다.
  </div>
</footer>

</body>
</html>
